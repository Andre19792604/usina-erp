# ─────────────────────────────────────────────────────────────────────────────
# Usina ERP — Configuração Nginx
# Proxy reverso: / → frontend (SPA)  |  /api → backend  |  /ws → WebSocket
# ─────────────────────────────────────────────────────────────────────────────

upstream backend  { server backend:3001;  }
upstream frontend { server frontend:80;   }

# ── HTTP — redireciona para HTTPS se certificado existir ─────────────────────
server {
    listen 80;
    server_name _;

    # Descomente quando tiver certificado SSL:
    # return 301 https://$host$request_uri;

    # Sem SSL — serve direto:
    include /etc/nginx/conf.d/locations.conf;
}

