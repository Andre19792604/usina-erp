version: '3.8'

services:
  # ─── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: usina-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-usina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usina123}
      POSTGRES_DB:       ${POSTGRES_DB:-usina_erp}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-usina}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usina-erp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER:-usina}:${POSTGRES_PASSWORD:-usina123}@postgres:5432/${POSTGRES_DB:-usina_erp}
      JWT_SECRET:     ${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT:           3001
      NODE_ENV:       ${NODE_ENV:-production}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost}
      SCALE_HOST:     ${SCALE_HOST:-}
      SCALE_PORT:     ${SCALE_PORT:-4001}
      MX3000_HOST:    ${MX3000_HOST:-}
      MX3000_PORT:    ${MX3000_PORT:-4002}
    expose:
      - '3001'
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend (build estático servido pelo Nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: usina-erp-web
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - backend

  # ─── Nginx — proxy reverso + SSL-ready ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: usina-erp-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro  # Coloque aqui cert.pem e key.pem para HTTPS

volumes:
  pgdata:
  uploads:
