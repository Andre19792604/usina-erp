<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USINA ERP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#0a0f1a;--surface:#111827;--surface2:#1f2937;--border:#374151;--text:#f9fafb;--text2:#9ca3af;--amber:#f59e0b;--amber2:#d97706;--red:#ef4444;--green:#10b981;--blue:#3b82f6;--purple:#8b5cf6}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:14px}
.logo-text{font-weight:700;font-size:15px;color:var(--amber)}
.logo-sub{font-size:10px;color:var(--text2)}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(245,158,11,.15);color:var(--amber);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);text-align:center}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
#page-title{font-weight:700;font-size:18px;flex:1}
.badge{background:rgba(245,158,11,.2);color:var(--amber);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
/* Cards */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
.stat-val{font-size:26px;font-weight:700}
.stat-change{font-size:12px;margin-top:4px}
.up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--text2)}
/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 12px;border-bottom:1px solid rgba(55,65,81,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn-primary{background:var(--amber);color:#000}
.btn-primary:hover{background:var(--amber2)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
/* Badges */
.status{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.status-green{background:rgba(16,185,129,.15);color:var(--green)}
.status-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.status-red{background:rgba(239,68,68,.15);color:var(--red)}
.status-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.status-purple{background:rgba(139,92,246,.15);color:var(--purple)}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.toolbar-right{margin-left:auto;display:flex;gap:8px}
input[type=text],input[type=date],input[type=number],input[type=email],select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;outline:none}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--amber)}
.search{width:220px}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-row textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);padding:4px;border-radius:10px;width:fit-content}
.tab{padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;transition:.15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{border-left:3px solid var(--green)}
.toast-error{border-left:3px solid var(--red)}
.toast-info{border-left:3px solid var(--blue)}
/* Activity */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(55,65,81,.5)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-text{font-size:13px}
.activity-time{font-size:11px;color:var(--text2);margin-top:2px}
/* Progress */
.progress{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:4px;background:var(--amber);transition:.3s}
/* Page header */
.page-header{display:flex;align-items:center;margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:700;flex:1}
/* Section title */
.section-title{font-size:14px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
/* Misc */
.text-amber{color:var(--amber)}.text-red{color:var(--red)}.text-green{color:var(--green)}.text-blue{color:var(--blue)}
.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--amber);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000}
</style>
</head>

<!-- Toast container -->

<!-- Modal: Nova Venda -->
<div class="modal-bg" id="modal-venda">

</div>

<!-- Modal: Ordem de Produção -->

    <div class="form-row"><label>Produto *</label><select id="op-prod"><option value="">Selecione...</option><option>Açúcar VHP</option><option>Etanol Anidro</option><option>Etanol Hidratado</option></select></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
let DB = {
  vendas: [
    {id:'PV-2024',cliente:'Açucareira Piracicaba',produto:'Açúcar VHP',qtd:500,preco:2850,total:1425000,data:'2026-03-20',status:'Aprovado'},
    {id:'PV-2025',cliente:'Trading Canavieira Exportações',produto:'Etanol Anidro',qtd:200,preco:3200,total:640000,data:'2026-03-22',status:'Em Transporte'},

function saveVenda() {
  const cli = v('v-cliente'), prod = v('v-produto'), qtd = Number(v('v-qtd')), preco = Number(v('v-preco')), data = v('v-data');
  if(!cli||!prod||!qtd||!preco||!data) return toast('Preencha todos os campos obrigatórios.','error');
  DB.vendas.unshift({id:'PV-'+pvCounter++,cliente:cli,produto:prod,qtd,preco,total:qtd*preco,data,status:'Pendente'});
  closeModal('modal-venda'); clearModal(['v-cliente','v-produto','v-qtd','v-preco','v-data','v-obs']);
  toast('Pedido criado com sucesso!','success'); render('vendas');
}

function saveProduto() {
  const nome = v('p-nome'), cat = v('p-cat'), estoque = Number(v('p-estoque')), min = Number(v('p-min'));
  if(!nome||!cat||estoque===''||min==='') return toast('Preencha todos os campos obrigatórios.','error');
  const un = v('p-un'), preco = Number(v('p-preco'));

  DB.estoque.push({id:DB.estoque.length+1,nome,cat,estoque,min,un,preco,status});

// ─── UTILITIES ───────────────────────────────────────────────────────────────
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function clearModal(ids) { ids.forEach(id => { const el=document.getElementById(id); if(el) el.value=''; }); }

document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); }));

function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.style.opacity='0', 2800);
  setTimeout(() => t.remove(), 3100);
}

function fmtMoney(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2});
}

function statusClass(s) {
  const m = {Aprovado:'status-green',Pendente:'status-amber','Em Transporte':'status-blue',Rascunho:'status-purple','Em Andamento':'status-blue',Concluído:'status-green',Cancelado:'status-red',Vencendo:'status-red'};
  return m[s] || 'status-amber';
}

function filterTable(input, tableId, ...cols) {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    const text = cols.map(c => row.cells[c]?.textContent.toLowerCase()).join(' ');
    row.style.display = text.includes(q) ? '' : 'none';
  });
}

function filterTableByStatus(sel, tableId, col) {
  const q = sel.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    const cell = row.cells[col]?.textContent.toLowerCase() || '';
    row.style.display = (!q || cell.includes(q)) ? '' : 'none';
  });
}
