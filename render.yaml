databases:
  - name: usina-erp-db
    plan: free
    databaseName: usina_erp
    user: usina

services:
  # ─── Backend API ──────────────────────────────────────────────
  - type: web
    name: usina-erp-api
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx tsx prisma/seed.ts 2>/dev/null; node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: usina-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://usina-erp-web.onrender.com
    healthCheckPath: /health

  # ─── Frontend (Static Site) ──────────────────────────────────
  - type: web
    name: usina-erp-web
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://usina-erp-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
